<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cross-Domain Recommender (Movies to Music)</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div id="intro">
        <div class="m-wrapper">
            <div class="m-letter">MOVIC</div>
            <div class="m-streak"></div>
        </div>
        <h1 class="maddyflix-title">MOVIE - MUSIC RECOMMENDER</h1>
    </div>

    <div id="main-content" class="hidden">
        <header class="header">
            <h1>AURAA MADD</h1>
            <p>Enter your favorite movies and discover music that matches your vibe!</p>
        </header>

        <main>
            <section id="movie-section">
                <div id="results-header">
                    <h2 id="category-title">Recommended Music</h2>
                    <button id="play-audio-btn" type="button" class="icon-btn hidden-control" aria-label="Play voice summary">
                        &#128266;
                    </button>
                </div>
                <div id="results" class="grid"></div>
            </section>
        </main>

        <div id="input-section">
            <input
                type="text"
                id="user-input"
                placeholder="Enter movie reviews, separated by a semicolon (;)..."
                autocomplete="off"
                spellcheck="false"
            />
            <button id="send-btn" type="button">Get Recommendations</button>
            <button id="record-btn" type="button">&#127908; Record</button>
        </div>
        <div id="upload-section">
            <div class="file-upload">
                <label for="audioFileInput" class="file-label">&#128193; Choose Audio</label>
                <span id="fileName">No file selected</span>
                <input type="file" id="audioFileInput" accept="audio/*" hidden />
            </div>
            <button id="uploadBtn" type="button">&#128193; Upload Audio</button>
        </div>
        <div id="status" aria-live="polite"></div>
        <audio id="voice-audio" preload="auto"></audio>
    </div>

    <script src="script.js"></script>
</body>
</html>
